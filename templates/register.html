{% extends "base.html" %}
{% block title %}Farmspace | Register{% endblock %}
{% block content %}
<div class="auth-shell mx-auto">
  <div class="auth-card">
    <h1 class="h3 fw-bold mb-2">Create account</h1>
    <p class="text-muted mb-4">Register to use the prediction tool and shop features.</p>
    <form method="post" class="vstack gap-3">
      <div>
        <label class="form-label" for="name">Full name</label>
        <input class="form-control form-control-lg" id="name" name="name" type="text" required>
      </div>
      <div>
        <label class="form-label" for="email">Email</label>
        <input class="form-control form-control-lg" id="email" name="email" type="email" required>
      </div>
      <div>
        <label class="form-label" for="password">Password</label>
        <input class="form-control form-control-lg" id="password" name="password" type="password" required>
      </div>
      <button class="btn btn-warning btn-lg w-100" type="submit">Register</button>
    </form>
    <p class="text-muted mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
  </div>
</div>
{% endblock %}
