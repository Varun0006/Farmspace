{% extends "base.html" %}
{% block title %}Farmspace | Login{% endblock %}
{% block content %}
<div class="auth-shell mx-auto">
  <div class="auth-card">
    <h1 class="h3 fw-bold mb-2">Welcome back</h1>
    <p class="text-muted mb-4">Log in to access prediction and your cart.</p>
    <form method="post" class="vstack gap-3">
      <div>
        <label class="form-label" for="email">Email</label>
        <input class="form-control form-control-lg" id="email" name="email" type="email" required>
      </div>
      <div>
        <label class="form-label" for="password">Password</label>
        <input class="form-control form-control-lg" id="password" name="password" type="password" required>
      </div>
      <button class="btn btn-primary btn-lg w-100" type="submit">Login</button>
    </form>
    <p class="text-muted mt-3 mb-0">No account yet? <a href="{{ url_for('register') }}">Create one</a>.</p>
  </div>
</div>
{% endblock %}
